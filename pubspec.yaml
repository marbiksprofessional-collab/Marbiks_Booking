name: marbiks_premium_erp
description: "Premium Luxury Enterprise Application Layer for Marbiks Booking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Cupertino Icons for clean Apple-like iOS aesthetic styling
  cupertino_icons: ^1.0.5

  # State Management & Network requests configuration tools
  flutter_bloc: ^8.1.3
  http: ^1.1.0

  # Luxury UI components (Beautiful Date pickers & Shimmer effects)
  table_calendar: ^3.0.9
  shimmer: ^3.0.0
  google_fonts: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
