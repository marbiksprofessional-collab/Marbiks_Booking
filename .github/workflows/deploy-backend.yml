name: Deploy Backend to AWS

# Builds the backend Docker image, pushes it to ECR, registers a new ECS
# task definition revision pointing at it, and updates the ECS service to
# use it - i.e. this is what runs *after* the one-time Terraform apply
# described in infra/aws/README.md.
#
# Requires two repository variables/secrets (Settings -> Secrets and
# variables -> Actions), both produced by `terraform apply` in infra/aws:
#   AWS_DEPLOY_ROLE_ARN  - the `github_actions_deploy_role_arn` Terraform output
#   AWS_REGION           - the region you deployed into (e.g. ap-south-1)
#   ECS_CLUSTER          - the `ecs_cluster_name` Terraform output
#   ECS_SERVICE          - the `ecs_service_name` Terraform output
#   ECR_REPOSITORY_URL   - the `ecr_repository_url` Terraform output
#
# No long-lived AWS access keys are stored in this repo - authentication is
# via GitHub's OIDC token federated to the IAM role Terraform created
# (infra/aws/modules/github_oidc), scoped to exactly this repo.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC -> AssumeRoleWithWebIdentity
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        working-directory: backend
        env:
          IMAGE_URI: ${{ vars.ECR_REPOSITORY_URL }}:${{ github.sha }}
          IMAGE_LATEST: ${{ vars.ECR_REPOSITORY_URL }}:latest
        run: |
          docker build -t "$IMAGE_URI" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_URI"
          docker push "$IMAGE_LATEST"

      - name: Fetch current task definition
        id: current-task-def
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_SERVICE }}" \
            --query 'taskDefinition' > task-definition.json

      - name: Render new task definition with the freshly-built image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: backend
          image: ${{ vars.ECR_REPOSITORY_URL }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          cluster: ${{ vars.ECS_CLUSTER }}
          service: ${{ vars.ECS_SERVICE }}
          wait-for-service-stability: true
